<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuval Mashiah</title>

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Optional: Also pre-apply language direction to prevent layout shifts
            const savedLang = localStorage.getItem('lang') || 'he';
            document.documentElement.setAttribute('lang', savedLang);
            document.documentElement.setAttribute('dir', savedLang === 'he' ? 'rtl' : 'ltr');
        })();
    </script>

    <link rel="stylesheet" href="resources/css/styles.css">
    <link rel="stylesheet" href="resources/css/animations.css">
    <link rel="icon" href="resources/images/icon.png?v=2" type="image/png">
</head>

<body>

    <div class="container">
        <div id="global-header"></div>

        <div class="hero-container">
            <div class="hero-profile reveal reveal-scale">
                <img id="profile-img" alt="Profile" class="profile-img img-hover-zoom">
                <div class="profile-info reveal reveal-right delay-200">
                    <h1 data-i18n="greeting">Yuval Mashiah</h1>
                    <span class="location-text" data-i18n="hero_location">Israel</span>
                </div>
            </div>

            <div class="hero-socials" id="socials">
            </div>
        </div>

        <div class="hero-context reveal reveal-up delay-300">
            <h2 class="hero-title" data-i18n="hero_role">Full-Stack Developer</h2>
            <p class="hero-subtitle" data-i18n="hero_student">3rd Year Student...</p>

            <div id="home-skills-container" class="home-skills-preview">
            </div>

            <div class="hero-actions">
                <a href="projects.html" class="btn btn-primary" data-i18n="btn_projects">My Projects</a>
                <a href="?tab=skills" class="btn btn-outline" data-i18n="btn_skills">Full Skill Set</a>
            </div>
        </div>

        <!-- Resume Section -->
        <div id="resume-section" class="controls-bar">
            <div class="view-toggle">
                <button id="btn-view-visual" class="chip active" data-action="switchView" data-target="visual"
                    data-i18n="view_visual">Visual</button>
                <button id="btn-view-plain" class="chip" data-action="switchView" data-target="plain"
                    data-i18n="view_plain">Plain</button>
                <button id="btn-view-preview" class="chip" data-action="switchView" data-target="preview"
                    data-i18n="view_preview">Preview</button>
            </div>

            <div class="download-dropdown">
                <button id="btn-download-cv" class="btn btn-primary"
                    style="display: flex; align-items: center; gap: 8px;">
                    <span data-i18n="btn_download">Download CV</span>
                </button>
                <div class="dropdown-menu">
                    <a href="#" id="dl-he" class="dropdown-item" target="_blank" data-i18n="opt_he">Hebrew</a>
                    <a href="#" id="dl-en" class="dropdown-item" target="_blank" data-i18n="opt_en">English</a>
                </div>
            </div>
        </div>

        <div id="view-visual">
            <div class="tab-bar">
                <button class="tab-btn active" data-action="switchTab" data-target="experience"
                    data-i18n="tab_exp">Experience</button>
                <button class="tab-btn" data-action="switchTab" data-target="skills"
                    data-i18n="tab_skills">Skills</button>
                <button class="tab-btn" data-action="switchTab" data-target="education"
                    data-i18n="tab_edu">Education</button>
            </div>

            <div id="experience" class="tab-content active">
                <div id="experience-content" class="timeline-container">
                </div>
            </div>

            <div id="skills" class="tab-content">
                <div id="skills-content" class="skills-section">
                </div>
            </div>

            <div id="education" class="tab-content">
                <div id="education-content" class="timeline-container">
                </div>
            </div>
        </div>

        <div id="view-plain" style="display: none;">
            <div id="plain-content" class="plain-container">
            </div>
        </div>

        <div id="view-preview" style="display: none;">
            <div class="pdf-container">
                <iframe id="resume-pdf-frame" src="" title="Resume PDF"></iframe>
            </div>
        </div>

        <div id="global-footer"></div>
    </div>

    <script type="module" src="resources/js/pages/index.js"></script>
</body>

</html>
